services:
  - type: web
    name: sochsamajh-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_TIMEOUT_SECONDS
        value: "20"
      - key: OPENAI_MAX_RETRIES
        value: "1"
      - key: ENABLE_RETRIEVER
        value: "false"
      - key: LANGCHAIN_TRACING_V2
        value: "false"
